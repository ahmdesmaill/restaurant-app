<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Jimmy's Diner</title>
        <link rel="stylesheet" href="styles.css" />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Smythe&display=swap"
            rel="stylesheet"
        />
    </head>
    <body>
        <header>
            <h1>Jimmy’s Diner</h1>
            <h2>The best burgers and pizzas in town.</h2>
        </header>
        <main>
            <section id="menu"></section>

            <section id="order">
                <h2>Your order</h2>
                <div id="order-items"></div>
                <div id="total-wrapper">
                    <h3>Total price:</h3>
                    <h4 id="total-price">$26</h4>
                </div>
                <button type="button" id="order-btn">
                    Complete order
                </button>
            </section>

            <dialog id="payment-dialog">
                <button type="button" id="close-dialog">X</button>
                <h2>Enter card details</h2>
                <form id="payment-form">
                    <input
                        type="text"
                        placeholder="Enter your name"
                        name="fullName"
                        aria-label="Full name"
                        required
                    />
                    <input
                        type="text"
                        inputmode="numeric"
                        pattern="[0-9]{13,19}"
                        maxlength="19"
                        placeholder="Enter card number"
                        name="cardNumber"
                        aria-label="Card number"
                        required
                    />
                    <input
                        type="text"
                        inputmode="numeric"
                        pattern="\d{3,4}"
                        maxlength="4"
                        placeholder="Enter CVV"
                        name="cvv"
                        aria-label="CVV"
                        required
                    />
                    <button type="submit" id="pay-btn">Pay</button>
                </form>
            </dialog>

            <section id="confirmation">
                <h2>Thanks, James! Your order is on its way!</h2>
                <a href="#" id="order-again"
                    >You can also click here to order again</a
                >
            </section>
        </main>
        <script src="main.js" type="module"></script>
    </body>
</html>
